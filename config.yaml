# 每日新聞聚合器設定

schedule:
  morning: "07:00"  # 早報
  evening: "21:00"  # 晚報

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"  # 從環境變數讀取
  chat_id: "${TELEGRAM_CHAT_ID}"

claude:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096

market:
  alpha_vantage_key: "${ALPHA_VANTAGE_KEY}"
  indices:
    # ── 🇺🇸 美股指數 ──
    - symbol: "^GSPC"
      name: "S&P 500"
      group: "us"
    - symbol: "^IXIC"
      name: "NASDAQ"
      group: "us"
    - symbol: "^DJI"
      name: "道瓊工業"
      group: "us"
    - symbol: "SOXX"
      name: "費城半導體"
      group: "us"

    # ── 🇺🇸 美股產業 ETF + 龍頭個股 ──
    - symbol: "XLK"
      name: "科技"
      group: "sector"
      leaders: ["AAPL", "MSFT", "NVDA"]
    - symbol: "XLF"
      name: "金融"
      group: "sector"
      leaders: ["BRK-B", "JPM", "V"]
    - symbol: "XLV"
      name: "醫療"
      group: "sector"
      leaders: ["LLY", "JNJ", "ABBV"]
    - symbol: "XLE"
      name: "能源"
      group: "sector"
      leaders: ["XOM", "CVX", "COP"]
    - symbol: "XLI"
      name: "工業"
      group: "sector"
      leaders: ["GE", "CAT", "RTX"]
    - symbol: "XLY"
      name: "非必需消費"
      group: "sector"
      leaders: ["AMZN", "TSLA", "HD"]
    - symbol: "XLC"
      name: "通訊"
      group: "sector"
      leaders: ["META", "GOOGL", "NFLX"]
    - symbol: "XLU"
      name: "公用事業"
      group: "sector"
      leaders: ["NEE", "SO", "DUK"]
    - symbol: "XLRE"
      name: "房地產"
      group: "sector"
      leaders: ["WELL", "PLD", "AMT"]
    - symbol: "XLP"
      name: "民生消費"
      group: "sector"
      leaders: ["WMT", "COST", "PG"]
    - symbol: "XLB"
      name: "原物料"
      group: "sector"
      leaders: ["LIN", "NEM", "FCX"]

    # ── 🇹🇼 台股 + 🌏 亞洲 ──
    - symbol: "^TWII"
      name: "台股加權"
      group: "tw_asia"
      leaders: ["2330.TW", "2317.TW", "2454.TW"]
    - symbol: "^N225"
      name: "日經225"
      group: "tw_asia"
    - symbol: "^HSI"
      name: "恆生指數"
      group: "tw_asia"
    - symbol: "000001.SS"
      name: "上證指數"
      group: "tw_asia"
    - symbol: "^KS11"
      name: "KOSPI"
      group: "tw_asia"

    # ── ₿ 加密貨幣 ──
    - symbol: "BTC-USD"
      name: "Bitcoin"
      group: "crypto"
    - symbol: "ETH-USD"
      name: "Ethereum"
      group: "crypto"

    # ── 🇪🇺 歐洲 ──
    - symbol: "^GDAXI"
      name: "德國DAX"
      group: "europe"
    - symbol: "^FTSE"
      name: "英國FTSE"
      group: "europe"
    - symbol: "^STOXX"
      name: "STOXX 600"
      group: "europe"

    # ── 📊 情緒指標 ──
    - symbol: "^VIX"
      name: "VIX 恐慌"
      group: "sentiment"

    # ── 💱 匯率 ──
    - symbol: "DX-Y.NYB"
      name: "美元指數"
      group: "forex"
    - symbol: "USDTWD=X"
      name: "USD/TWD"
      group: "forex"
    - symbol: "EURUSD=X"
      name: "EUR/USD"
      group: "forex"
    - symbol: "USDJPY=X"
      name: "USD/JPY"
      group: "forex"
    - symbol: "CNY=X"
      name: "USD/CNY"
      group: "forex"

feeds:
  # ── 💰 財經與總經 ──
  finance:
    category: "💰 財經與總經"
    sources:
      - name: "CNBC Top News"
        url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
      - name: "CNBC Finance"
        url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664"
      - name: "CNBC Economy"
        url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=20910258"
      - name: "Investing.com"
        url: "https://www.investing.com/rss/news.rss"
      - name: "Seeking Alpha"
        url: "https://seekingalpha.com/market_currents.xml"
      - name: "Bloomberg Markets"
        url: "https://feeds.bloomberg.com/markets/news.rss"
      - name: "中央社 財經"
        url: "https://feeds.feedburner.com/rsscna/finance"
      - name: "自由時報 財經"
        url: "https://news.ltn.com.tw/rss/business.xml"
      - name: "經濟日報 產經"
        url: "https://money.udn.com/rssfeed/news/1001/5588?ch=money"
      - name: "經濟日報 股市"
        url: "https://money.udn.com/rssfeed/news/1001/5607?ch=money"
      - name: "經濟日報 國際"
        url: "https://money.udn.com/rssfeed/news/1001/5599?ch=money"
      - name: "Crunchbase News"
        url: "https://news.crunchbase.com/feed/"
      - name: "TechCrunch Venture"
        url: "https://techcrunch.com/category/venture/feed/"
      - name: "CoinDesk"
        url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
      - name: "Cointelegraph"
        url: "https://cointelegraph.com/rss"

  # ── 🌏 地緣政治與科技政策 ──
  geopolitics:
    category: "🌏 地緣政治與科技政策"
    summary_prompt: "geopolitics"
    sources:
      - name: "CNN Politics"
        url: "http://rss.cnn.com/rss/cnn_allpolitics.rss"
      - name: "NPR Politics"
        url: "https://feeds.npr.org/1014/rss.xml"
      - name: "Fed 聯準會"
        url: "https://www.federalreserve.gov/feeds/press_all.xml"
      - name: "中央社 政治"
        url: "https://feeds.feedburner.com/rsscna/politics"
      - name: "中央社 國際"
        url: "https://feeds.feedburner.com/rsscna/intworld"
      - name: "中美科技戰"
        url: "https://news.google.com/rss/search?q=%22US-China%22+tech+OR+semiconductor+OR+tariff&hl=en-US&gl=US&ceid=US:en"
